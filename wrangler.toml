# Cloudflare Workers — static-assets deploy (no server/runtime code).
# Build with `npm run build` (emits ./dist), then `wrangler deploy`.
name = "this-indian-life"
compatibility_date = "2026-06-04"

# Custom domain — wrangler provisions the DNS record + edge cert on deploy.
# Requires the thisindianlife.today zone to be in this Cloudflare account.
routes = [
  { pattern = "thisindianlife.today", custom_domain = true }
]

[assets]
directory = "./dist"
# src/pages/404.astro is emitted as /404.html and served for any unmatched path.
not_found_handling = "404-page"
# Directory build emits /path/index.html; serve canonical trailing-slash URLs.
html_handling = "auto-trailing-slash"

# _headers and _redirects in ./dist are honored automatically.
#
# To also serve www, add { pattern = "www.thisindianlife.today", custom_domain = true }
# above, or set a www->apex redirect rule in the dashboard.
